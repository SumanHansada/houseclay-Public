spring.application.name=backend
spring.datasource.url=${DATABASE_URL:}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto = update
server.port=8080
server.address=0.0.0.0
spring.elasticsearch.uris=${ELASTIC_SEARCH_URL:}
spring.elasticsearch.connection-timeout=10s
spring.elasticsearch.socket-timeout=30s
razorpay.key_id=${RAZORPAY_KEY:}
razorpay.key_secret=${RAZORPAY_SECRET:}
aws.s3.bucketName=${S3_BUCKET:}
aws.region=${AWS_REGION:}
aws.accessKeyId=${AWS_ACCESS_KEY:}
aws.secretAccessKey=${AWS_SECRET_KEY:}
ses.from=ankit.biswas@houseclay.com
msg91.base-url=https://control.msg91.com/api/v5
msg91.auth-key=${MSG91_AUTH_KEY:}
msg91.template-id=69007f0cc46fae128f5f2823
otp.sign-key=${OTP_SIGN_KEY:}
otp.hash-key=${OTP_HASH_KEY:}
contact.property-cost=1

# Bundle Settings
app.bundle.connects=30
app.bundle.standard-price=1499

# Connect Settings
app.connect.expiration-days=30
app.property.reverification-expiration-days=30

# Cookie Settings
app.cookie.secure=${COOKIE_SECURE:true}
app.cookie.same-site=${COOKIE_SAME_SITE:None}
app.cookie.domain=${COOKIE_DOMAIN:.houseclay.com}
