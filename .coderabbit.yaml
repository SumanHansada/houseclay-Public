language: "en-US"

reviews:
  path_instructions:
    - path: "hc-backend/**"
      instructions: "This is a Spring Boot Java backend. Focus on transaction boundaries, JPA pitfalls, and security issues."
    - path: "hc-frontend/**"
      instructions: "Next.js 15 + React 19 client-facing site. Focus on performance, accessibility, and SSR correctness."
    - path: "zebra-ui/**"
      instructions: "Admin portal. Focus on data validation and admin-only access patterns."

