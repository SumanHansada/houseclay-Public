services:
  # -----------------------------------------------------------------------
  # 🗄️ INFRASTRUCTURE (Shared Database Layer)
  # -----------------------------------------------------------------------
  postgres-db:
    image: postgres:16-alpine
    container_name: houseclay-db
    # This service starts for ALL profiles
    profiles: ["backend", "houseclay", "zebra", "full-setup"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - houseclay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: houseclay-es
    # This service starts for ALL profiles
    profiles: ["backend", "houseclay", "zebra", "full-setup"]
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ELASTIC_PORT}:${ELASTIC_PORT}"
    volumes:
      - houseclay_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: houseclay-pgadmin
    # This service starts for ALL profiles
    profiles: ["backend", "houseclay", "zebra", "full-setup"]
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres-db:
        condition: service_healthy
    volumes:
      - houseclay_pgadmin_data:/var/lib/pgadmin

  # -----------------------------------------------------------------------
  # ☕ BACKEND (Java Spring Boot)
  # -----------------------------------------------------------------------
  backend-app:
    build:
      context: ./hc-backend/backend
      dockerfile: Dockerfile
    container_name: houseclay-backend
    # Starts for ALL profiles
    profiles: ["backend", "houseclay", "zebra", "full-setup"]
    restart: no
    depends_on:
      postgres-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8080:8080"
    # Load the backend's specific ENV file for app secrets (AWS, Razorpay, etc.)
    env_file:
      - ./hc-backend/backend/.env
    environment:
      - SERVER_PORT=8080
    healthcheck:
      # ---------------------------------------------------------------------
      # Bash TCP Ping
      # Works on Alpine AND Jammy. Does not require curl/wget.
      # Fast check. Only verifies if port 8080 is open (accepting connections).
      # ---------------------------------------------------------------------
      test:
        [
          "CMD-SHELL",
          "bash -c '(echo > /dev/tcp/localhost/8080) >/dev/null 2>&1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # -----------------------------------------------------------------------
  # MAIN WEBSITE (Next.js)
  # -----------------------------------------------------------------------
  frontend-main:
    build:
      context: ./hc-frontend
      dockerfile: Dockerfile.dev
    container_name: houseclay-main-website
    profiles: ["houseclay", "full-setup"]
    restart: no
    depends_on:
      backend-app:
        condition: service_healthy
    ports:
      - "${MAIN_APP_PORT}:3000"
    volumes:
      - ./hc-frontend:/app
      - houseclay_main_node_modules:/app/node_modules
    environment:
      # CRITICAL: 0.0.0.0 allows access from outside the container
      - HOSTNAME=0.0.0.0
      - NODE_ENV=development
      - USE_HTTPS=false
      # Client-side (Browser) talks to localhost:8080
      - NEXT_PUBLIC_HOUSECLAY_API_BASE_URL=http://localhost:8080/api

  # -----------------------------------------------------------------------
  # ADMIN PORTAL (Next.js)
  # -----------------------------------------------------------------------
  frontend-admin:
    build:
      context: ./zebra-ui
      dockerfile: Dockerfile.dev
    container_name: houseclay-admin-portal
    profiles: ["zebra", "full-setup"]
    restart: no
    depends_on:
      backend-app:
        condition: service_healthy
    ports:
      - "${ADMIN_APP_PORT}:3000"
    volumes:
      - ./zebra-ui:/app
      - houseclay_admin_node_modules:/app/node_modules
    environment:
      - HOSTNAME=0.0.0.0
      - NODE_ENV=development
      - USE_HTTPS=false
      - NEXT_PUBLIC_HOUSECLAY_API_BASE_URL=http://localhost:8080/api

# -----------------------------------------------------------------------
# 💾 NAMED VOLUMES
# -----------------------------------------------------------------------
volumes:
  houseclay_postgres_data:
    name: houseclay_postgres_data
  houseclay_es_data:
    name: houseclay_es_data
  houseclay_pgadmin_data:
    name: houseclay_pgadmin_data
  houseclay_main_node_modules:
    name: houseclay_main_node_modules
  houseclay_admin_node_modules:
    name: houseclay_admin_node_modules
