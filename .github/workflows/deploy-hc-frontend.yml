name: Deploy hc-frontend

on:
  push:
    branches:
      - main
    paths:
      - "hc-frontend/**"
      - ".github/workflows/deploy-hc-frontend.yml"

jobs:
  deploy-hc-frontend:
    name: Deploy hc-frontend to Houseclay Host
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Transfer hc-frontend source code to Houseclay Host
        run: |
          echo "${{ secrets.FRONTEND_SECURITY_KEY }}" > zebra_key.pem
          chmod 600 zebra_key.pem
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no -i zebra_key.pem" hc-frontend ec2-user@${{ secrets.FRONTEND_HOST }}:/home/ec2-user/

      - name: Install pm2 on Houseclay Host
        run: |
          ssh -o StrictHostKeyChecking=no -i zebra_key.pem ec2-user@${{ secrets.FRONTEND_HOST }} << EOF
          sudo npm install -g pm2
          EOF

      - name: Build hc-frontend on Houseclay Host
        env:
          NEXT_PUBLIC_HOUSECLAY_API_BASE_URL: ${{ secrets.EC2_HOST }}:8080/api
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no -i zebra_key.pem ec2-user@${{ secrets.FRONTEND_HOST }} << EOF
          cd /home/ec2-user/hc-frontend
          rm -f .env.local

          echo "NEXT_PUBLIC_HOUSECLAY_API_BASE_URL=$EC2_HOST" >> .env.local
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY" >> .env.local
          echo "NEXT_PUBLIC_RAZORPAY_API_KEY=$RAZORPAY_KEY" >> .env.local

          # CLEAR ALL NEXT.js BUILD CACHES
          rm -rf .next
          rm -rf node_modules/.cache

          npm install
          npm run build:prod
          EOF

      # Configure AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Invalidate Cloudfront cache
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # Frontend server
      - name: Start hc-frontend on Houseclay Host
        run: |
          ssh -o StrictHostKeyChecking=no -i zebra_key.pem ec2-user@${{ secrets.FRONTEND_HOST }} << EOF
          cd /home/ec2-user/hc-frontend
          pm2 delete houseclay-ui-app || true
          pm2 start npm --name "houseclay-ui-app" -- start
          EOF
