name: Deploy hc-frontend

# FROZEN 2026-05-11 — Houseclay ops paused. See docs/freeze-2026-05/FREEZE-RUNBOOK.md
# Revival: restore the push trigger block below after EC2 is back per REVIVAL-RUNBOOK.md
#
# Original trigger (restore on revival):
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - "hc-frontend/**"
#       - ".github/workflows/deploy-hc-frontend.yml"
on:
  workflow_dispatch:

jobs:
  deploy-hc-frontend:
    name: Deploy hc-frontend to Houseclay Host
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Transfer hc-frontend source code to Houseclay Host
        run: |
          echo "${{ secrets.FRONTEND_SECURITY_KEY }}" > zebra_key.pem
          chmod 600 zebra_key.pem
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no -i zebra_key.pem" hc-frontend ec2-user@${{ secrets.FRONTEND_HOST }}:/home/ec2-user/

      - name: Install pm2 on Houseclay Host
        run: |
          ssh -o StrictHostKeyChecking=no -i zebra_key.pem ec2-user@${{ secrets.FRONTEND_HOST }} << EOF
          sudo npm install -g pm2
          EOF

      - name: Build hc-frontend on Houseclay Host
        env:
          HOUSECLAY_API_BASE_URL: "https://apis.houseclay.com/api"
          GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          RAZORPAY_API_KEY: ${{ secrets.RAZORPAY_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no -i zebra_key.pem ec2-user@${{ secrets.FRONTEND_HOST }} << EOF
          cd /home/ec2-user/hc-frontend
          rm -f .env.local

          # Injecting the environment variables explicitly.
          # NOTE: Next.js requires environment variables to be prefixed with 'NEXT_PUBLIC_' 
          # in order to be exposed to the browser/client-side code.
          echo "NEXT_PUBLIC_HOUSECLAY_API_BASE_URL=$HOUSECLAY_API_BASE_URL" >> .env.local
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" >> .env.local
          echo "NEXT_PUBLIC_RAZORPAY_API_KEY=$RAZORPAY_API_KEY" >> .env.local

          # CLEAR ALL NEXT.js BUILD CACHES
          rm -rf .next
          rm -rf node_modules/.cache

          npm install || exit 1
          npm run build:prod || exit 1
          EOF

      # Configure AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Invalidate Cloudfront cache
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # Frontend server
      - name: Start hc-frontend on Houseclay Host
        run: |
          ssh -o StrictHostKeyChecking=no -i zebra_key.pem ec2-user@${{ secrets.FRONTEND_HOST }} << EOF
          cd /home/ec2-user/hc-frontend
          pm2 delete houseclay-ui-app || true
          pm2 start npm --name "houseclay-ui-app" -- run start:prod
          EOF
