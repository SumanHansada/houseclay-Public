name: Deploy Applications to EC2 and Zebra Hosts

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy hc-backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build hc-backend
        run: |
          cd hc-backend/backend
          mvn clean package -DskipTests

      - name: Deploy hc-backend to EC2
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

          scp -o StrictHostKeyChecking=no -i ec2_key.pem hc-backend/backend/target/*.jar ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/backend/app.jar

          ssh -o StrictHostKeyChecking=no -i ec2_key.pem ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          pkill -f 'java.*app.jar' || true
          nohup java -jar /home/ec2-user/backend/app.jar > /home/ec2-user/backend/app.log 2>&1 &
          EOF

  deploy-frontends:
    name: Deploy hc-frontend and zebra-ui to Zebra Host (build on server)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Transfer source code to ZEBRA_HOST
        run: |
          echo "${{ secrets.ZEBRA_SECURITY_KEY }}" > zebra_key.pem
          chmod 600 zebra_key.pem

          # Copy hc-frontend and zebra-ui source
          rsync -az -e "ssh -o StrictHostKeyChecking=no -i zebra_key.pem" hc-frontend ec2-user@${{ secrets.ZEBRA_HOST }}:/home/ec2-user/
          rsync -az -e "ssh -o StrictHostKeyChecking=no -i zebra_key.pem" zebra-ui ec2-user@${{ secrets.ZEBRA_HOST }}:/home/ec2-user/

      - name: SSH and build frontends on Zebra Host
        env:
          NEXT_PUBLIC_HOUSECLAY_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_HOUSECLAY_API_BASE_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no -i zebra_key.pem ec2-user@${{ secrets.ZEBRA_HOST }} << 'EOF'
          set -e

          # Build hc-frontend
          cd /home/ec2-user/hc-frontend
          echo "NEXT_PUBLIC_HOUSECLAY_API_BASE_URL=$NEXT_PUBLIC_HOUSECLAY_API_BASE_URL" >> .env.local
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY" >> .env.local
          npm install
          npm run build:prod

          # Build zebra-ui
          cd /home/ec2-user/zebra-ui
          npm install
          npm run build
          EOF
