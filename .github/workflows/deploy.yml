name: Deploy Spring Boot to AWS EC2

on:
  push:
    branches:
      - main  # Change to your default branch if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build the project using Maven
        run: mvn clean package -DskipTests

      - name: Transfer JAR file to EC2
        run: |
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          scp -o StrictHostKeyChecking=no -i private_key.pem target/*.jar ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app.jar

      - name: Restart Application on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          sudo kill -9 $(lsof -t -i:8080) || true
          nohup java -jar /home/ec2-user/app.jar > /home/ec2-user/app.log 2>&1 &
          EOF
