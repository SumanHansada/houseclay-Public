name: Deploy Spring Boot and Next.js to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js (Latest Stable)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # Build Spring Boot Backend
      - name: Build the Spring Boot Project using Maven
        run: |
          cd hc-backend/backend
          mvn clean package -DskipTests
      
      # Set Environment Variables for Houseclay UI
      - name: Set Environment Variables for Houseclay UI
        run: |
          cd hc-frontend
          echo "NEXT_PUBLIC_HOUSECLAY_API_BASE_URL=${{ secrets.NEXT_PUBLIC_HOUSECLAY_API_BASE_URL }}" >> .env.local
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}" >> .env.local

      # Build Houseclay UI Next.js Frontend
      - name: Install Dependencies and Build Houseclay UI
        run: |
          cd hc-frontend
          npm install
          npm run build:prod

      # Set Environment Variables for Zebra UI
      - name: Set Environment Variables for Zebra UI
        run: |
          cd zebra-ui
          echo "NEXT_PUBLIC_HOUSECLAY_API_BASE_URL=${{ secrets.NEXT_PUBLIC_HOUSECLAY_API_BASE_URL }}" >> .env.local
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}" >> .env.local

      # Build Zebra UI Next.js Frontend
      - name: Install Dependencies and Build Zebra UI
        run: |
          cd zebra-ui
          npm install
          npm run build:prod

      - name: Debug SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh-keygen -y -f private_key.pem

      - name: Test SSH Connection
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh -v -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ secrets.EC2_HOST }} "echo 'SSH Connection Successful'"

      # Transfer JAR and Next.js Build to EC2
      - name: Transfer JAR and Next.js Build Files to EC2
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          scp -o StrictHostKeyChecking=no -i private_key.pem hc-backend/backend/target/*.jar ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/backend/app.jar
          scp -o StrictHostKeyChecking=no -i private_key.pem hc-frontend/package.json ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/frontend/package.json
          scp -o StrictHostKeyChecking=no -i private_key.pem hc-frontend/package-lock.json ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/frontend/package-lock.json
          scp -o StrictHostKeyChecking=no -i private_key.pem -r hc-frontend/.next ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/frontend
          scp -o StrictHostKeyChecking=no -i private_key.pem -r hc-frontend/public ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/frontend
          scp -o StrictHostKeyChecking=no -i private_key.pem zebra-ui/package.json ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/zebra/package.json
          scp -o StrictHostKeyChecking=no -i private_key.pem zebra-ui/package-lock.json ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/zebra/package-lock.json
          scp -o StrictHostKeyChecking=no -i private_key.pem -r zebra-ui/.next ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/zebra
          scp -o StrictHostKeyChecking=no -i private_key.pem -r zebra-ui/public ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/zebra
      
      # Start Applications
      - name: Start Spring Boot and Next.js on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          # Start Spring Boot
          sudo kill -9 $(lsof -t -i:8080) || true
          nohup java -jar /home/ec2-user/backend/app.jar > /home/ec2-user/backend/app.txt 2>&1 &

          # Install Node.js and PM2 if not installed
          if ! command -v node &> /dev/null; then
            curl -fsSL https://rpm.nodesource.com/setup_lts.x | sudo bash -
            sudo yum install -y nodejs
          fi
          
          if ! command -v pm2 &> /dev/null; then
            sudo npm install -g pm2
          fi

          if ! command -v yarn &> /dev/null; then
            sudo npm install -g yarn
          fi

          # Delete all pm2 apps
          pm2 delete all || true

          # Npm install in frontend and zebra
          cd /home/ec2-user/frontend
          yarn install
          cd /home/ec2-user/zebra
          yarn install

          # Start Houseclay UI
          cd /home/ec2-user/frontend
          pm2 delete houseclay-ui-app || true
          pm2 start npm --name "houseclay-ui-app" -- run start:prod

          # Start Zebra UI
          cd /home/ec2-user/zebra
          pm2 delete zebra-ui-app || true
          pm2 start npm --name "zebra-ui-app" -- run start:prod -- --port=3001
          EOF
