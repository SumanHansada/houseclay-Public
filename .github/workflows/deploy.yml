name: Deploy Spring Boot and Next.js to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js (Latest Stable)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # Build Spring Boot Backend
      - name: Build the Spring Boot Project using Maven
        run: |
          cd hc-backend/backend
          mvn clean package -DskipTests

      # Build Next.js Frontend
      - name: Install Dependencies and Build Next.js
        run: |
          cd hc-frontend
          npm install
          npm run build

      - name: Debug SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh-keygen -y -f private_key.pem

      - name: Test SSH Connection
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh -v -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ secrets.EC2_HOST }} "echo 'SSH Connection Successful'"

      # Transfer JAR and Next.js Build to EC2
      - name: Transfer JAR and Next.js Build Files to EC2
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          scp -o StrictHostKeyChecking=no -i private_key.pem hc-backend/backend/target/*.jar ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app.jar
          scp -o StrictHostKeyChecking=no -i private_key.pem hc-frontend/package.json ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/frontend/package.json
          scp -o StrictHostKeyChecking=no -i private_key.pem hc-frontend/package-lock.json ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/frontend/package-lock.json
          scp -o StrictHostKeyChecking=no -i private_key.pem -r hc-frontend/.next ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/frontend
          scp -o StrictHostKeyChecking=no -i private_key.pem -r hc-frontend/public ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/frontend

      # Restart Applications
      - name: Restart Spring Boot and Next.js on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          # Restart Spring Boot
          sudo kill -9 $(lsof -t -i:8080) || true
          nohup java -jar /home/ec2-user/app.jar > /home/ec2-user/app.log 2>&1 &

          # Install Node.js and PM2 if not installed
          if ! command -v node &> /dev/null; then
            curl -fsSL https://rpm.nodesource.com/setup_lts.x | sudo bash -
            sudo yum install -y nodejs
          fi
          
          if ! command -v pm2 &> /dev/null; then
            sudo npm install -g pm2
          fi

          # Restart Next.js
          cd /home/ec2-user/frontend
          npm install --omit=dev
          pm2 stop all || true
          pm2 start npm --name "next-app" -- run start
          EOF
