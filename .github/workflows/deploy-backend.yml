name: Deploy Backend

# FROZEN 2026-05-11 — Houseclay ops paused. See docs/freeze-2026-05/FREEZE-RUNBOOK.md
# Revival: restore the push trigger block below after EC2/RDS are back per REVIVAL-RUNBOOK.md
#
# Original trigger (restore on revival):
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - 'hc-backend/**'
#       - '.github/workflows/deploy-backend.yml'
on:
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy hc-backend to EC2
    runs-on: ubuntu-latest

    env:
      PROJECT_PATH: hc-backend/backend
      TARGET_JAR: hc-backend/backend/target/backend-0.0.1-SNAPSHOT.jar
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_USERNAME: ${{secrets.DATABASE_USERNAME}}
      DATABASE_PASSWORD: ${{secrets.DATABASE_PASSWORD}}
      ELASTIC_SEARCH_URL: ${{secrets.ELASTIC_SEARCH_URL}}
      RAZORPAY_KEY: ${{secrets.RAZORPAY_KEY}}
      RAZORPAY_SECRET: ${{secrets.RAZORPAY_SECRET}}
      S3_BUCKET: ${{secrets.S3_BUCKET}}
      AWS_REGION: ${{secrets.AWS_REGION}}
      AWS_ACCESS_KEY: ${{secrets.AWS_ACCESS_KEY}}
      AWS_SECRET_KEY: ${{secrets.AWS_SECRET_KEY}}
      MSG91_AUTH_KEY: ${{secrets.MSG91_AUTH_KEY}}
      OTP_SIGN_KEY: ${{secrets.OTP_SIGN_KEY}}
      OTP_HASH_KEY: ${{secrets.OTP_HASH_KEY}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build hc-backend
        run: |
          cd $PROJECT_PATH
          mvn clean package -DskipTests

      - name: Deploy JAR to EC2
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

          echo "Uploading JAR to EC2..."
          scp -o StrictHostKeyChecking=no -i ec2_key.pem $TARGET_JAR ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/backend/app.jar

          echo "Restarting app on EC2..."
          ssh -o StrictHostKeyChecking=no -i ec2_key.pem ec2-user@${{ secrets.EC2_HOST }} << 'EOF'

          echo "Exporting secrets..."  
          export DATABASE_URL='${{ secrets.DATABASE_URL }}'
          export DATABASE_USERNAME='${{ secrets.DATABASE_USERNAME }}'
          export DATABASE_PASSWORD='${{ secrets.DATABASE_PASSWORD }}'
          export ELASTIC_SEARCH_URL='${{ secrets.ELASTIC_SEARCH_URL }}'
          export RAZORPAY_KEY='${{ secrets.RAZORPAY_KEY }}'
          export RAZORPAY_SECRET='${{ secrets.RAZORPAY_SECRET }}'
          export S3_BUCKET='${{ secrets.S3_BUCKET }}'
          export AWS_REGION='${{ secrets.AWS_REGION }}'
          export AWS_ACCESS_KEY='${{ secrets.AWS_ACCESS_KEY }}'
          export AWS_SECRET_KEY='${{ secrets.AWS_SECRET_KEY }}'
          export MSG91_AUTH_KEY='${{ secrets.MSG91_AUTH_KEY }}'
          export OTP_SIGN_KEY='${{ secrets.OTP_SIGN_KEY }}'
          export OTP_HASH_KEY='${{ secrets.OTP_HASH_KEY }}'
          
          echo "Killing old app..."
          pkill -f 'java.*app.jar' || true

          echo "Killing process on port 8080 if running..."
          PID=$(lsof -t -i:8080)
          if [ -n "$PID" ]; then
            echo "Killing PID $PID..."
            kill -9 $PID
          else
            echo "No process found on port 8080."
          fi
          
          echo "Starting new app..."
          nohup java -jar /home/ec2-user/backend/app.jar > /home/ec2-user/backend/app.log 2>&1 &
          
          echo "App started."
